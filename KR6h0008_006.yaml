body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑑正號大廣智大興善寺三藏沙門不空奉詔譯爾時寶吉祥菩薩問大虛空藏菩薩言仁者汝已淨出世間道耶虛空藏菩薩言善男子如是已淨復問言云何已淨答言我清淨故已淨復問言云何我清淨答言世間清淨故我清淨復問言云何世間清淨答言善男子色前際清淨無去故色後際清淨無來故色中際清淨不住故如是受想行識識前際清淨無去故識後際清淨無來故識中際清淨不住故善男子是故名為世間清淨復問仁者如是世間清淨欲何所顯答言善男子顯一切法悉皆清淨復問云何顯一切法清淨答曰以智慧故知一切法前際後際之分齊故復問云何一切法前後分齊答曰不斷不常故復問於彼不斷不常是何言説答曰不斷不常是不生不滅言説復問於彼不生不滅是何言説答曰不生不滅是無言説復問云何法無言説答曰是法無數故復言仁者法若無數云何隨於名數答曰善男子譬如虛空不隨名數但以名數假名虛空如是名數即非名數復問云何數非數門答曰數門者説有為法非數門者説無為法又數非數法皆是無為是故佛説應以智慧遠離一切稱量數法於有為數以識稱量如理觀察爾時不見是法應斷是不應斷是法應證是不應證是法應修是不應修不見諸法亦不作限量若無見無量是時即獲無所執著得無悕望若無悕望則無所緣得無所緣則得無我若得無我則無所執云何無所執不執色是常無常不執受想行識是常無常不執色是苦是樂不執受想行識是苦是樂不執色是我無我乃至不執識是我無我不執色是淨非淨乃至不執識是淨非淨不執色是空非空乃至不執識是空非空即獲無所執著三摩地得是三摩地已常起大悲度諸有情不見流轉生死煩惱所以者何生死涅槃性無別故於諸有情現見涅槃亦知自身本來涅槃是名菩薩般涅槃行善男子云何菩薩般涅槃行般涅槃者名無有觀行回向薩婆若於薩婆若不作色求不作受想行識求以無求心住清淨戒滿足本願於一切法不見增減獲於平等住於法界由住法界行菩薩行亦無行法而為所行善男子是為菩薩般涅槃行復問云何無行有行觀察涅槃善男子菩薩作意觀察涅槃名為有行證於無行以無行故名為涅槃復次菩薩於言説詮表不生分別名為涅槃又涅槃者名為彼岸而彼岸者無有諸相於彼諸相心不取著名為涅槃又彼岸者名無分別於彼不起分別心故名為涅槃又彼岸者無阿賴耶於彼不起阿賴耶心故名為涅槃善男子如是行已名為菩薩般涅槃行爾時世尊讚虛空藏菩薩言善哉善哉正士快説此法契於菩薩般涅槃行説此法時會中有五百菩薩得無生法忍爾時大虛空藏菩薩摩訶薩白佛言世尊由於如來智慧光明照曜我等故得斯辨非我能也譬如日光照閻浮提所有色像如是世尊大調御士慧光明力能令我等曉了諸法亦復如是爾時寶吉祥菩薩謂虛空藏菩薩言善男子汝今云何隱其自智皆言盡是如來加持虛空藏言一切菩薩所獲辨才皆是如來之所加持非唯於我善男子若無如來所説諸法菩薩從何而有辨才寶吉祥言若因如來生菩薩辨當知佛辨可移轉耶虛空藏言如來辨才無有移轉但為其因以因如來所説之法生菩薩辨譬如無明不轉至行但為行因生起行故如是佛辨無所移轉但為作因生菩薩辨又如象馬人聲不轉至谷因彼等聲生於谷響故彼聲等但與谷響而作其因佛辨亦爾無有移轉但與菩薩辨才作因寶吉祥言如來常説甚深緣生又説諸法而無所生善男子豈無緣生一切法耶虛空藏言若緣有作者是法有生因緣之法無有作者是故諸法説無有生寶吉祥言如來今者出現於世豈非生耶虛空藏言若真如有生可説如來有其生也若許真如無有生者不應徵責如來出世以為有生是故無生説為如來如來者於一切法隨所覺悟名為如來汝善男子復云何言如來生耶此應置答復問云何置答對曰如法性住是名為置復問法性云何住虛空藏言住不生不滅不住非不住是名法性住如法性住無所住一切諸法亦復如是住無所住如來亦爾住無所住不生不滅非住非不住如是非住非不住名如來住處善男子言如來生者是著一邊言不生者亦著一邊離此二邊名為中道善男子觀如來者應如是觀若異觀者非正觀也寶吉祥言如來生義如是甚深住無所住不生不滅虛空藏言善男子若解此佛生之義者不生增上復問善男子云何名增上虛空藏言增上者名增益句謂於無中妄生增益法無增益若能於法不生增益名平等句無等句無句無句句無文字句無了別句於彼無心意識所行無所行句其無所行句譬如空中實無鳥迹假以言説説鳥迹聲如是如來實無有生假以言説説佛出世其智慧者方能曉了不生句義所以者何此不生句義即是一切諸法自性所謂無生而此無生亦無自性無自性者無有所住無所住際是一切法際住一切法際名為實際亦名邊際際遍一切處故由是證得一切法實際猶如虛空平等無有限齊彼法實際亦無限齊若限齊際者不名一切法實際如是平等一切法實際則我際知我際則知一切有情際若知一切有情際則知一切法實際是實際是我際是一切有情際是一切法際是名盡際夫盡際者涅槃之謂也證此理者名得涅槃又一切法者無有相待離相對治譬如虛空無能對治如是諸法亦無對治若言有涅槃可入可求是生滅見此法應生此法應滅彼人則為行於生滅不知涅槃平等一性以不知故則著諸法妄生諍論如世尊言若知我教授應知則為滿足沙門最勝功德爾時具壽阿難陀白佛言甚奇世尊大虛空藏菩薩無礙辨才乃能如是由自身證能作斯説時大虛空藏菩薩語阿難陀言大德不應説言我自身證所以者何我身即虛空以身虛空故知一切法悉為虛空云何大德言我身證阿難陀言身若空者汝以何身而作佛事虛空藏言以法身故法身者無有遷變蘊處界等不生不滅非顛倒身得隨意現意所成身而作佛事阿難陀言大士汝證法身耶虛空藏言大德如我所解離法無身我身即法法即我身若法若身無有二相故言身證阿難陀言大士若身證者汝得阿羅漢耶答言無所得故而得所以者何阿羅漢者善能通達無諍法故不染不恚亦不癡故復言大士若如是者汝應究竟般涅槃耶虛空藏言大德阿羅漢者不般涅槃何以故知一切法究竟涅槃斷涅槃想但諸異生作是分別言我涅槃乃至分別計有種種涅槃差別阿難陀言大士如汝所説菩薩非阿羅漢非異生非學非無學非辟支佛非菩薩非如來虛空藏言善哉善哉具壽阿難陀以非阿羅漢非異生非學非無學非辟支佛非菩薩非如來故菩薩於一切處皆能示現亦不住於一切位地説是法時會中有五百阿羅漢各各脫身所著上服而以供養虛空藏菩薩作如是言願一切有情獲得辨才如虛空藏爾時大虛空藏菩薩以加持力故令其所奉上妙法衣盡入虛空隱而不現彼等羅漢苾芻問虛空藏菩薩言大士如是等衣為何所在虛空藏言並入於我虛空庫藏爾時世尊熙怡微笑阿難陀白佛言世尊何因緣故而現微笑如來微笑非無因緣唯願演説佛告阿難陀言彼諸苾芻所奉衣服以虛空藏菩薩威神力故令衣盡入虛空庫藏往彼袈裟幢世界山王如來所而作佛事虛空藏菩薩所説法音於彼世界皆從袈裟之所流出無量菩薩聞此法已皆得無生法忍阿難陀當知菩薩神通智勝以如是等種種言音成就有情以是因緣故我笑耳説是法時忽於空中雨無量日月光花皆如火色昔所未見花中出聲而作是言若人聞此大虛空藏菩薩所説不退法印得生信解必定當趣菩提道場爾時阿難陀白佛言世尊如是之花從何所來佛告阿難陀有一梵王名光莊嚴為百千世界主是彼梵天為供養虛空藏菩薩故雨如是花阿難陀言世尊我等咸願見彼梵王佛言且待須臾汝當自見爾時光莊嚴梵王與諸梵衆六十萬八千人前後圍繞從彼天沒至於佛前頭面禮足右繞三匝退坐一面合掌向佛白言甚奇世尊此虛空藏菩薩不可思議具足淨戒威德三摩地威德神通威德智慧威德滿願威德善巧方便威德增上意樂威德法身自在威德身莊嚴威德口意莊嚴威德於一切法自在威德世尊是虛空藏菩薩都不從於身口意業勤發示現一切化事但由往昔修習之力積集善根滿足諸佛甚深之行由此能作大師子吼佛言如是如是梵王如汝所説菩薩皆由昔善根力積集福智資糧而於無上正等菩提誓不退轉能現如是神通化事爾時光莊嚴梵王白佛言世尊云何為菩薩善根云何為福云何為智佛告梵王言善根者謂諸有情最初發於阿耨多羅三藐三菩提心福者謂發心已超於一切聲聞緣覺為諸有情修行布施持戒及修所成一切福業智者謂以所集善根回向薩婆若故復次善根者謂淨意樂無矯誑故福者加行積集一切福故智者增上意樂悉殊勝故復次善根者於諸善法願堅固故福者集善資糧無厭足故智者所有善根觀如幻故復次善根者謂獲善友福者不捨善友智者數問善友復次善根者樂求佛法福者所聞不忘智者悅於法樂復次善根者常求佛法福者説法無所悕望智者於法無吝復次善根者常樂聽法福者如理觀察智者如法修行復次善根者常樂見佛福者常供養佛智者隨順佛教復次善根者謂獲出家福者修聖種行智者樂住蘭若復次善根者善能修習少欲知足福者於諸衣食任運不貪智者於所受用任運無染復次善根者修念處觀福者滿四正斷智者獲如意足復次善根者謂入信根福者修於進念智者觀三摩地慧復次善根者住於五力福者隨順覺支智者入聖道智復次善根者心住妙理福者求奢摩他資糧智者得毗鉢舍那善巧復次善根者謂施所成福業事福者謂戒所成福業事智者謂修所成福業事復次善根者謂增上戒學福者增上心學智者增上慧學復次善根者説悔諸罪福者隨喜衆善智者勸請諸佛復次善根者捨諸所有福者不悕望報智者回向菩提復次善根者於戒要期福者持戒不缺智者持戒回向復次善根者於諸有情不懷損害福者所聞惡語而能忍受智者能捨身命成就有情復次善根者勤求善法不生厭倦福者以所有善根回施有情智者積集善根回向菩提復次善根者謂能修習諸禪支等福者謂獲禪定一切善根智者從諸禪定現生欲界復次善根者慧力多聞福者所聞觀察智者慧得圓滿復次善根者等視有情福者證得慈定智者慈心平等猶如虛空復次善根者謂修習三地資糧福者積集四地資糧智者圓滿八九十地資糧復次善根者謂初發心菩薩福者住行菩薩智者不退菩薩復次善根者謂平等行福者相好莊嚴智者無見頂相復次善根者莊嚴佛土福者心念惠施智者利諸有情復次善根者聞説魔業福者覺察魔業智者能超魔業復次善根者謂具大悲福者善巧方便智者謂修般若復次善根者莊嚴菩提道場福者善能摧壞諸魔智者謂一剎那心相應慧成於正覺梵王如是名為善根福智爾時光莊嚴梵王白佛言甚奇世尊能以三句義説一切法時大虛空藏菩薩摩訶薩告光莊嚴梵天言梵天有一句能攝一切法云何為一謂性空句所以者何由一切法同空性故是謂一句復有一句攝一切法謂無相句無願句皆攝一切法如是廣説乃至無行句離欲句寂靜句無阿賴耶句法界句真如句實際句不生句不起句涅槃句各攝一切法亦如是復次梵王欲者是離欲句以離欲性即是欲故一切佛法亦同是性嗔者是離嗔句以離嗔性即是嗔故一切佛法亦同是性癡者是離癡句以離癡性即是癡故一切佛法亦同是性乃至身見者是無身見句以無身見性即是身見故一切佛法亦同是性色者是無色句以無色性即是色故一切佛法亦同是性如是受想行識識者是無識句以無了別性即是識故一切佛法亦同是性如是廣説處界十二緣生無明者即是明句以明性即是無明故一切佛法亦同是性乃至生者是不生句以不生性即是生故一切佛法亦同是性一切法句者是無法句以無法性即是諸佛法故一切佛法亦同是性梵王是為一句攝一切法若菩薩入此法門者則於一句入一切佛法梵王譬如大海吞納衆流是一一句攝一切法亦復如是譬如虛空能包萬像此一一句攝一切法亦復如是是故此句無盡展轉無量譬如算師數以算籌布在局上然局中無籌籌中無局而能展轉成無量數如是一句成無量句亦復如是梵王如是等百千劫所説校量佛法若身若心皆無所得亦不可以數知何以故一切法者是佛法故是佛法者即非法故所以者何以想分別以想遍知假名説故於中無相亦非無相無法非無法究竟無相此相清淨自相遠離猶如虛空同一自性佛法亦爾性相皆空虛空藏菩薩説是法時於彼梵衆二萬二千梵天皆發阿耨多羅三藐三菩提心復次五千梵王以宿植善根獲無生法忍丙午歲高麗國大藏都監奉敕雕造
