body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑑正號大廣智大興善寺三藏沙門不空奉詔譯爾時會中釋梵護世見與波旬授菩提記一切皆生奇特之心歎言希有甚奇世尊彼等諸魔於佛善說法毗奈耶而作魔事猶見如來福不唐捐皆蒙授記當證無上正等菩提究竟涅槃世尊豈有善男子善女人以善信心入於佛法所獲福業而得校量當知皆是諸佛境界非餘聲聞緣覺所測爾時佛告釋梵護世諸天人等如汝所說誠諦不虛實是諸佛如來境界善男子夫心者是緣生法譬如染纈或處受色或處不受有情心行亦復如是或起煩惱或復不起或有利根或有鈍根如來隨根設法教化悉令解悟引入法中善男子夫煩惱者無有方所亦無住處復無積聚從不如理作意和合而生若如理觀察是雜染性則為清淨然我密意說名邪見若如實知則為正見非邪正見過現實有若於邪見正見知己不生取著是則名為入正見道善男子煩惱如皮清淨為性由彼所覆慧明無力是故不見根本清淨復次有分別者名為煩惱無分別者名清淨性善男子譬如大地依水而住水依風住風依空住是四界中空無所依以其虛空不壞不動無所積聚無積聚故住不生滅自性相應是故三界不久不住無常變異非虛空界如是蘊處界依業煩惱而住業煩惱依非如理作意而住非如理作意依自性清淨心住是清淨心不為客塵煩惱所染所有非如理作意業煩惱蘊處界等一切皆是因緣和合故有因緣若闕則不生起彼清淨性無有因緣亦無和合亦不生滅如虛空性非如理作意如風業煩惱如水蘊處界如地由是一切諸法無有堅牢根本無住本來清淨善男子是名自性清淨法光明門菩薩由證此法門故不為一切諸煩惱垢之所染污亦不思惟此清淨法以不思故則滅一切尋伺緣慮證清淨性由證清淨則超魔境以超魔境則安住佛境以住佛境則超有情境入不動法界以入不動清淨法界則入平等無差別境則名獲得一切智智說此法時有無量菩薩於業煩惱障一切纏垢悉得遠離證無生忍爾時室利毱多優婆塞於大衆中即從座起頭面禮足而白佛言世尊我今從佛聞此解脫清淨法門頓除疑悔所以者何我昔曾設深大火坑及和毒食於如來所起損害意世尊威德無所損傷為我說法雖少信向心猶疑惑仍生追悔今於佛前復得聞此甚深經典疑網悉除心無憂悔獲法光明發阿耨多羅三藐三菩提心世尊我於今者名為大益得殊勝利爾時佛讚室利毱多長者言善哉善哉善男子汝今聞我所說法故生淨信樂由是因緣於賢劫中所有諸佛悉皆承事恭敬供養於彼佛所廣修梵行護持正法過七百萬阿僧祇劫當得成佛號曰離一切纏如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊時室利毱多優婆塞聞佛與授阿耨多羅三藐三菩提記歡喜踊躍得未曾有即解嚴身上妙瓔珞散於佛上作如是言世尊今我宅中有四大藏無量金寶充滿其中以第一藏捨與妻子僮僕及營事者第二大藏捨與一切貧窮下賤孤獨乞人第三大藏捨與一切往來苾芻及四方僧第四大藏奉獻如來及上首苾芻唯願世尊令我速獲無住相施功德成就我今欲於如來善說毗奈耶中出家受戒修習梵行於是世尊聽其出家時室利毱多優婆塞即便出家受具足戒爾時大虛空藏菩薩白佛言世尊如來於無量阿僧祇劫之所積集甚深難得阿耨多羅三藐三菩提法於佛滅後誰當奉持時彼衆中有六十俱胝菩薩摩訶薩即從座起合掌禮佛異口同音說伽他曰如來滅度後我等悉皆能不惜於身命護持佛正法捨一切名利及離諸眷屬不捨此正法為證佛智故毀呰及罵辱麁言不善語由護正法故如此皆能忍輕賤及掉弄誹謗不稱讚如此悉皆忍為持此經故當來諸苾芻住相希名利為魔之伴黨於法為障礙毀戒破法者親近於俗人貪著供養故不專求正法好習於外道無知懷憍慢自讚歎己身惱亂寂靜者棄捨阿蘭若常樂無利言好習惡呪術計著於身見或樂知僧事與僧作留難捨離於禪誦交雜諸世務常求於利養不樂戒多聞雖行於布施心恆懷雜染計種種我相但念於乞食樂往白衣家論說世俗事田農諸俗務貿易并販賣好作如是事自稱是沙門堅執於諸有計著種種見聞說真空法怖畏如深嶮不信有業果言無後世報但作虛誑語非法言是法惡世中苾芻自在力如王於此末法時我能持正法於諸修多羅不求亦不讀各自師己見執異互相非所有深經典與解脫相應於如是正法心皆不樂說及樂世俗論稱揚為希有如斯惡人輩不久滅正法微妙甚深經文義俱善巧於彼惡世時悉皆被滅壞非法無道王人庶皆流竄於如是惡世無不懷恐怖我等悉皆能處如是末世護持佛所說無上之正法以慈於有情設破於正法亦起悲愍心由持此經故若見持戒人起於貪愛心我以憐念故方便令棄捨若見惡心者謗毀於正法為之起慈悲令見我歡喜隨力護彼人不加麁惡語亦不與之言彼當自安住復以四攝行成熟彼等人又令生警覺省悟虛妄過我當捨憒閙住於阿蘭若不親近俗務猶如鹿自在少求及知足修行四聖種住戒及頭陀具禪定智慧我當無間修調柔靜解脫若入於聚落為說微妙法若有求法者令遠住空間寂默自修持常安於法樂若有於現前作諸過失者我為利衆生當自觀身行住法常寂靜於敬與不敬安住如須彌不染世間法我當為導師苾芻毀戒者來加以惡言觀是自受業亦不起報心於他無害想常住於正法此非我應作我是於沙門彼無沙門行聞我正教誨則謗修多羅或斷我耳鼻亦不樂見我若聞實警覺則謗於正法當來諸苾芻受持正法者為其作留難不令聞正法於王離間語破壞於大衆我等承佛力皆令得聞法當彼惡世時寧捨於身命為持正法故作衆生利益先知他意樂後方共語言當來大怖時住是真實行我問世間眼法王光明尊由持此經典為得幾所福爾時世尊告大虛空藏菩薩及諸菩薩摩訶薩言善男子譬如東方一世界㭊為十三千大千世界如是南西北方四維上下各各㭊為十三千大千世界如是世界盡末為塵復以一塵為一世界若復有人於東方過爾所塵世界下於一塵復更東行過爾所塵世界又下一塵如是展轉盡爾所塵於東方諸佛世界無有邊際南西北方四維上下亦復如是善男子於汝意云何如是十方世界所下微塵知其數不不也世尊如是微塵世界唯有如來以無礙智之所究了非餘能知佛言善男子是諸世界若下微塵及不下處盡諸世界以為大城圍繞牆壁上至有頂下窮水際滿此城中著淨芥子以一芥子為一佛世界善男子於意云何是諸芥子世界寧為多不甚多世尊佛言善男子如是芥子及諸世界我知其數知百知千乃至知緊迦羅彌末羅阿閦婆等若有善男子善女人求菩提故以七寶滿爾所世界施於爾所芥子數住功德法菩薩諸佛及恭敬供養若復有人聞此甚深微妙經典能淨信忍所得福德勝前福德若復有人以爾所芥子數行無遮施或復有人得聞此經於諸有情生無礙心住調柔忍如七步頃繫念思惟所得福德勝前福德若復有人修諸福業成就爾所芥子數天主帝釋大梵天王轉輪聖王或復有人受持此經能知無常苦空無我涅槃寂靜如是知已於諸有情生於大悲為不斷三寶種故發無上正等菩提之心如是福德勝前福德爾時大虛空藏菩薩白佛言世尊唯願如來加持此經後末法時於贍部洲廣令流布是時佛告虛空藏菩薩言善男子我以此法付四天王所以者何由此四王護持世界故令此法久住世間廣得流布我今復以微妙真言加持四大天王即說真言曰怛儞也二合他度度𠼝他地梨特嚩二合惹跛底特嚩二合惹楞迦引𠼝阿引靺怛儞捨迷捨麼鉢底扇底丁以反目溪儞誐囉二合賀博乞叉二合哆阿奴娜囉塢那囉尾誐摩三摩鉢地簸他輸地鉢他奴誐摩鉢他輸地鉢囉二合枳娘二合目溪阿哩也二合句梨步多𠸪乞曬二合阿儞泥灑遮茗泥灑遮多引麼灑遮多怛簸灑遮沒馱簸那達摩奴散地阿哩也二合誐拏怒誐摩阿那哩也二合儞伽哆儞嚧瑟吒二合鉢囉二合娑娜寧咿濕嚩二合囉簸那魯迦失止二合怛唎二合訖哩二合多阿奴囉訖沙二合演都伊𤚥引達摩散地啼寢反尾婆惹都儞魯訖鞮二合涅泥上世引鉢囉二合底𠸪乞灑二合覩達摩馱哩尼爾時四大天王由此真言所加持故心懷悚栗身毛皆竪即往佛所頭面禮足白佛言世尊我等四王護持此經當令未來久住於世我能攝持如是經典所流行處有不樂法諸神天龍夜叉乾闥婆阿修羅迦樓羅無能障礙若有樂法善神即當令彼心得寂靜若有法師於說法會忘失文句能令憶持獲得辨才增長慧解爾時世尊告四天王善哉善哉汝等四王皆是我子從法化生由我勸汝守護正法功德因緣得為天王當超世間速證圓寂爾時世尊復告大虛空藏菩薩言善男子我今亦以真言加持帝釋令護此經久住於世說真言曰怛儞也二合他輸第輸婆末底輸婆尾庾二合係那捺𠼝那哩嬭覩哩嬭納迷捨迷塢波捨迷屈吠鳴驅黎阿蘇目溪馱囉尼阿囉嬭輸輸嚧二合曬婆呬低阿䏶泥䏶那散地三迷三摩嚩底三摩囉濕彌二合阿世呼呼奚奚驅嚧驅梨阿那底羯囉二合銘儞嚩𠸪乞灑二合摩𠰘低摩訶嚩婆娑鉢囉二合䏶阿𦾨車覩捨羯嚧泥嚩曩泯捺囉二合那捺舍多那夜那嚩羅摩矩吒達囉伊舍嚩二合嚕末嚕捺婆二合嚩那儞嚩斯娑嚩二合引訶引爾時天帝釋聞此真言已歡喜踊躍所住宮殿悉皆震動即與百千眷屬圍繞來詣佛所頭面禮足白佛言世尊我等諸天擁護此經於贍都洲廣宣流布令得修行若有法師受持此經我等眷屬咸共擁護令無惱患使得歡喜生淨信樂受持斯經皆得成就以法莊嚴若於王城聚落村邑說法之處我當率諸眷屬相共往詣彼法師所與作衛護若有輕賤嗔罵彼法師者令發淨心若有諸魔作諸障難我當擁護悉使退散不令得便爾時佛告天帝釋言善哉善哉憍尸迦汝當獲得天妙自在住法自在於一切佛所護持正法能師子吼何以故憍尸迦以能受持一佛正法即於三世諸佛所說正法皆能守護爾時世尊復告大虛空藏菩薩言善男子我為娑訶世界主大梵天王說威德真言句義由此真言故大梵天王護持此經即說真言曰怛儞也二合他每怛哩二合下同輸婆每怛哩二合達摩每怛哩二合每怛哩二合也怒娑呬鞮三摩每怛哩二合珊地每怛哩二合阿努誐摩每怛哩二合阿怒囉訖叉二合每怛哩二合阿努度囉每怛哩二合薩丁那二合每怛哩二合達磨每怛哩二合阿努蘗囉二合訶每怛哩二合阿尾鉢囉二合底丁以反娑囉每怛哩二合嗢盧迦那每怛哩二合尾盧迦那每怛哩二合母𠆙努誐摩每怛哩二合沒馱地瑟姹二合那每怛哩二合阿努囉乞叉二合每怛哩二合達摩鉢囉二合底丁以反𠸪乞叉二合拏每怛哩二合母乞叉二合每怛哩二合阿那奴哩嚧馱尾嚧馱每怛哩二合阿多牟每怛哩二合沒囉二合賀麼二合簸他每怛哩二合𠆙那楞迦囉每怛哩二合怛寫努珊地迦嚧那每怛哩二合怛寫奴珊地暮儞多每怛哩二合怛寫奴珊地庾二合閉訖叉二合每怛哩二合沒囉二合賀摩二合鉢地努誐摩那每怛哩二合質都儞尾哩也二合每怛哩二合阿奴娑囉拏每怛哩二合儞娑底二合囉拏每怛哩二合薩嚩怛囉二合拏誐麼那每怛哩二合阿㜸車末囉二合含門二合嗢悉𠼝二合惹𠆙那素大尾入蜜逾底丁以反瑟姹二合娑嚩二合婆嚩二合三摩提儞瑟羯囉二合摩摩訶尾麼難引尾也二合嚩魯迦耶染摸儞尾崩補甘反句嚧濕嚩二合達摩𠸪訖叉二合麼底丁寅反羯囉二合彌沒馱地瑟吒二合南爾時娑訶世界主大梵天王在於梵世由此慈心真言加持及佛威神力故天耳聞已即共六十六萬梵衆來詣佛所頭面禮足退坐一面白佛言世尊我等蒙佛大慈大悲加持力故令護此經若當來世有諸法師於此甚深祕密經典受持讀誦乃至書寫奉持供養若彼法師在阿蘭若及於衢路村邑聚落王城處所若為宣說如是經者我等當共擁護攝受加其氣力令得精勤念慧辨才悉皆增長不信者令信其淨信者令住正行世尊我等今於如來所說正法之眼皆共奉持廣令流布爾時世尊告大梵王言善哉善哉梵王如來今者隨喜汝等守護正法梵王汝當不久坐於道場轉正法輪如我今轉如汝今者擁護斯經諸餘梵天於當來世護持正法亦應如是爾時世尊復告慈氏菩薩摩訶薩言慈氏我今以此無量阿僧祇俱胝劫積集無上正等菩提希有之法付囑於汝乃至欲令受持讀誦為他廣說報佛恩故亦滿自己希求願故令諸有情增長善根故令諸菩薩護法光明故摧一切諸魔外道故護持正法不斷三寶種故慈氏菩薩白佛言世尊我今當於如來在世及涅槃後常護法藏何以故我亦曾於過去護斯正法世尊我雖在於覩史多天於是類經倍增護持令久住世世尊若未來世其有衆生於如是等經聞已受持書寫讀誦如法修行為他廣說當知皆是我之威力所加持故世尊當彼之時若有魔及魔民共為朋黨不能障難如我一毛成就善根㭊為百分千分歌羅分乃至優波尼沙陀分若三千大千世界之中一切有情悉並為魔若魔眷屬而於我所成就善根一分福智之力猶不能得生於障難何況如來於無量阿僧祇俱胝劫積集無上菩提之法而能障礙爾時世尊告慈氏菩薩言善哉善哉善男子有四種法為菩薩行何者為四所謂破煩惱魔壞諸外道成熟有情護持正法善男子如是四種是菩薩行而此四種以一行收云何為一所謂護持正法爾時世尊告尊者大迦葉波具壽阿難陀言我以此經付囑汝等汝當受持此經為他廣說大迦葉波言世尊我當隨力於如來無上菩提之法勤加守護為他宣說阿難陀言唯然世尊我已受持如是法要於當來世以佛威力廣宣流布令不斷絶爾時福莊嚴菩薩摩訶薩從座而起叉手合掌白佛言世尊如是之經如來所說甚深希有斷諸疑網最勝了義難見難悟是第一義空性相應以戒念定慧而為莊嚴顯說解脫寂靜無染是諸智人之所知境一切諸佛之所稱讚亦是一切諸經之王以陀羅尼印印之令受持者得無礙辨增長念慧堅固不退摧魔怨敵不為於他異宗所壞能摧惡戒增長頭陀無貪功德復是正住大捨功德出生無量諸佛智法若有善男子善女人能於此經受持讀誦繫念思惟為他廣說書寫供養審諦觀察如理作意正行相應得幾所福爾時世尊即以伽他告福莊嚴菩薩摩訶薩曰我以佛眼見十方廣大無邊諸剎土於中盛滿諸七寶盡皆普施諸菩薩若人受持是經典如佛所說無所得而能習誦為他說如是功德超於彼衆花塗香并傘蓋衣服繒綵及幢幡遍滿積彼世界中供養諸佛并菩薩於後末世法滅時若有受持此經典如說修行不放逸所獲福聚超於彼十方世界諸巨海盡皆盛滿種種油其炷高大如須彌然燈供養佛制底若有於彼法滅時世間盡為諸暗覆能燃如此大法炬所獲功德倍於前若於無量諸導師奉事經於億千劫以天適意妙供養勤求最勝佛菩提為報如來深重恩護持三寶令久住安諸有情住佛法持此經福多於彼以佛眼觀諸有情能致梵王帝釋位若有能持此經典獲大勝福過於彼令諸有情得羅漢復能成就緣覺乘若有能發菩提心受持此經福過彼假令經福皆為色盡虛空界不能受除佛世尊一切智於此勝福無能了若於俱胝千億劫持此如來所說經所生功德不可量猶如十方無有際爾時福莊嚴菩薩從佛聞是護持此經所得功德不可限量生大歡喜踊躍無量而白佛言世尊後末世時諸有情類若有不能持此經者當知是人墮於魔界世尊我觀護持自餘正法所獲善根猶如芥子若有能護此經法者所得功德如十方虛空無有窮盡不可譬喻世尊我今被於勇猛甲胄寧捨身命護持是經不為悕望己身之利但求一切有情安樂說此法時以大虛空藏菩薩福德力故有十方無量恆沙佛剎虛空藏菩薩及無量佛諸菩薩衆從於虛空雨種種花以為供養空中有聲而作是言善哉善哉大虛空藏菩薩摩訶薩乃能作此廣大佛事乃至於此大集法要殊勝莊嚴亦能攝受未來有情莊嚴正法令彼不失菩提之心於此經中受持讀誦書寫解說爾時世尊為欲囑纍此經典故以神通力即從身中放大光明遍照十方無量佛剎悉皆振動有無量阿僧祇有情發阿耨多羅三藐三菩提心無量有情得無生法忍復有無量有情心得解脫復有無量有情得法眼淨復有無量有情離諸貪染復有無量有情得於人天福德勝因當得見佛一切大衆皆生隨喜佛說是經已時大虛空藏菩薩摩訶薩具壽大迦葉波具壽阿難陀娑訶世界主大梵天王釋提桓因四大天王諸苾芻衆及大菩薩天人阿修羅乾闥婆等一切衆會聞佛所說皆大歡喜信受奉行
